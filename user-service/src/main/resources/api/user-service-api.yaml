openapi: 3.0.3
info:
  title: User Service API
  description: |
    用户服务 API 文档
    
    ## 认证说明
    大部分接口需要携带 JWT Token 进行认证。
    请在 Authorization 头部使用 Bearer Token 方式。
    
    ## 接口列表
    - 用户注册
    - 用户登录
    - Token 刷新
    - 用户信息查询
    - 角色管理
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:8081
    description: 本地开发环境
  - url: http://8.137.116.121:8081
    description: 生产环境

tags:
  - name: 认证
    description: 用户认证相关接口
  - name: 用户
    description: 用户管理接口
  - name: 角色
    description: 角色管理接口
  - name: OAuth/OIDC
    description: OAuth 2.0 / OIDC 授权接口
  - name: 管理
    description: 系统管理接口

paths:
  # ==================== 认证接口 ====================
  /user/auth/register:
    post:
      tags:
        - 认证
      summary: 用户注册
      description: 创建新用户账户
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /user/auth/login:
    post:
      tags:
        - 认证
      summary: 用户登录
      description: 用户登录获取 Token
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'

  /user/auth/refresh:
    post:
      tags:
        - 认证
      summary: 刷新 Token
      description: 使用 Refresh Token 获取新的 Access Token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: 刷新成功

  /user/auth/logout:
    post:
      tags:
        - 认证
      summary: 退出登录
      description: 撤销当前用户的所有 Token
      operationId: logout
      security:
        - Bearer Authentication: []
      responses:
        '200':
          description: 退出成功

  /user/auth/me:
    get:
      tags:
        - 认证
      summary: 获取当前用户
      description: 获取已登录用户的详细信息
      operationId: getCurrentUser
      security:
        - Bearer Authentication: []
      responses:
        '200':
          description: 成功

  # ==================== 用户接口 ====================
  /user/{id}:
    get:
      tags:
        - 用户
      summary: 根据ID获取用户
      operationId: getUserById
      security:
        - Bearer Authentication: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 成功

  # ==================== OAuth/OIDC 接口 ====================
  /oauth/authorize:
    get:
      tags:
        - OAuth/OIDC
      summary: OAuth 2.0 授权端点
      operationId: authorize
      parameters:
        - name: response_type
          in: query
          required: true
          schema:
            type: string
        - name: client_id
          in: query
          required: true
          schema:
            type: string
        - name: redirect_uri
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 返回授权页面或授权码

  /oauth/token:
    post:
      tags:
        - OAuth/OIDC
      summary: Token 端点
      operationId: token
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                grant_type:
                  type: string
                code:
                  type: string
      responses:
        '200':
          description: 返回 Token

  /oauth/jwks:
    get:
      tags:
        - OAuth/OIDC
      summary: JWKS 端点
      operationId: jwks
      responses:
        '200':
          description: 成功

  # ==================== 管理接口 ====================
  /user/admin/users:
    get:
      tags:
        - 管理
      summary: 获取所有用户列表
      operationId: getAllUsers
      security:
        - Bearer Authentication: []
      responses:
        '200':
          description: 成功

  /user/admin/roles:
    get:
      tags:
        - 管理
      summary: 获取所有角色
      operationId: getAllRoles
      security:
        - Bearer Authentication: []
      responses:
        '200':
          description: 成功

components:
  schemas:
    RegisterRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        inviteCode:
          type: string

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string
          format: password

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        refreshToken:
          type: string
        username:
          type: string
        email:
          type: string
        userId:
          type: integer
          format: int64
        tokenExpiresIn:
          type: integer
        refreshTokenExpiresIn:
          type: integer

    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        email:
          type: string
        enabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'

    Role:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string

  securitySchemes:
    Bearer Authentication:
      type: http
      scheme: bearer
      bearerFormat: JWT
