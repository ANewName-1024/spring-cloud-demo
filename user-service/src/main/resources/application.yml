server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:8432}/${DB_NAME:business_db}?ssl=true&sslmode=verify-full&sslrootcert=${SSL_CERT_PATH}
    username: ${DB_USERNAME:business}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      ssl: true
      sslrootcert: ${SSL_CERT_PATH}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USER:admin}:${EUREKA_PASSWORD}@${EUREKA_HOST}:${EUREKA_PORT:9000}/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:1800000}      # Access Token 30 分钟
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}  # Refresh Token 7 天

# 注册配置
auth:
  register:
    invite-code-required: ${INVITE_CODE_REQUIRED:false}
    invite-codes: ${INVITE_CODES:}
