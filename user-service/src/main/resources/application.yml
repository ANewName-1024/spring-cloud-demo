spring:
  application:
    name: user-service
  cloud:
    nacos:
      server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        namespace: public
        enabled: true
        register-enabled: true
      config:
        namespace: public
        enabled: true
        file-extension: yml
        refresh-enabled: true
        shared-configs:
          - data-id: shared-config.yml
            group: SHARED_GROUP
            refresh: true
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:8.137.116.121}:${DB_PORT:8432}/${DB_NAME:business_db}
    username: ${DB_USERNAME:business}
    password: ${DB_PASSWORD:NewPass2024}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

server:
  port: ${SERVER_PORT:8081}

jwt:
  secret: ${JWT_SECRET:UserServiceJWTSecretKey2024ChangeInProduction}
  expiration: 1800000
  refresh-expiration: 604800000

logging:
  level:
    com.example.user: DEBUG
    com.alibaba.cloud.nacos: DEBUG
