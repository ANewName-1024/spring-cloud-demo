server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:8.137.116.121}:${DB_PORT:8432}/${DB_NAME:business_db}?ssl=true&sslmode=verify-full&sslrootcert=${SSL_CERT_PATH:D:/java_project/springcloud-demo/server.crt}
    username: ${DB_USERNAME:business}
    password: ${DB_PASSWORD:Business@123}
    driver-class-name: org.postgresql.Driver
    hikari:
      ssl: true
      sslrootcert: ${SSL_CERT_PATH:D:/java_project/springcloud-demo/server.crt}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USER:admin}:${EUREKA_PASSWORD:Eureka@2024!Secure}@${EUREKA_HOST:8.137.116.121}:${EUREKA_PORT:9000}/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

jwt:
  secret: ${JWT_SECRET:your-secret-key-change-in-production}
  expiration: ${JWT_EXPIRATION:86400000}

# 注册配置
auth:
  register:
    invite-code-required: ${INVITE_CODE_REQUIRED:false}
    invite-codes: ${INVITE_CODES:}
