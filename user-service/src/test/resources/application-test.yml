spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: false

# JWT 测试配置
jwt:
  secret: testSecretKeyForJWTTokenGenerationMustBeLongEnough12345
  expiration: 3600000

# 注册配置
auth:
  register:
    invite-code-required: false

# 日志配置
logging:
  level:
    root: WARN
    com.example: DEBUG
