spring:
  application:
    name: gateway
  config:
    import: optional:file:./config
  
  # Gateway 配置
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/user/**
        - id: config-service
          uri: http://localhost:8082
          predicates:
            - Path=/config/**
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
            allowedHeaders: "*"

server:
  port: ${SERVER_PORT:8080}

# JWT 配置
jwt:
  secret: ${JWT_SECRET:GatewayJWTSecretKey2024ChangeInProduction}
  expiration: 1800000

# Eureka 配置
eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USER:admin}:${EUREKA_PASSWORD:EurekaNew2024}@${EUREKA_HOST:8.137.116.121}:${EUREKA_PORT:9000}/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

# Spring Cloud Config Client (禁用)
spring.cloud.config.enabled: false
spring.cloud.config.import-check.enabled: false

# 日志配置
logging:
  level:
    org.springframework.cloud.gateway: DEBUG

---
spring:
  config:
    activate:
      on-profile: dev
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081

---
spring:
  config:
    activate:
      on-profile: prod
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://user-service:8081
