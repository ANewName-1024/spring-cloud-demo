spring:
  application:
    name: gateway
  config:
    import: optional:file:./config
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=300s

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: http://localhost:8081
              predicates:
                - Path=/user/**
            - id: config-service
              uri: http://localhost:8082
              predicates:
                - Path=/config/**
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: "*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                allowedHeaders: "*"

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:GatewayJWTSecretKey2024ChangeInProduction}
  expiration: 1800000

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USER:admin}:${EUREKA_PASSWORD:EurekaNew2024}@${EUREKA_HOST:8.137.116.121}:${EUREKA_PORT:9000}/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

spring.cloud.config.enabled: false
spring.cloud.config.import-check.enabled: false

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
