spring:
  application:
    name: gateway
  cloud:
    nacos:
      server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        namespace: public
        enabled: true
        register-enabled: true
      config:
        namespace: public
        enabled: true
        file-extension: yml
        refresh-enabled: true
        shared-configs:
          - data-id: shared-config.yml
            group: SHARED_GROUP
            refresh: true
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/user/**
            - id: config-service
              uri: lb://config-service
              predicates:
                - Path=/config/**
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: "*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                allowedHeaders: "*"

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:GatewayJWTSecretKey2024ChangeInProduction}
  expiration: 1800000

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.alibaba.cloud.nacos: DEBUG
