server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: ops-service
  cloud:
    nacos:
      server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        namespace: public
        enabled: true
        register-enabled: true

  # Sleuth 分布式追踪配置
  sleuth:
    sampler:
      probability: 1.0
  zipkin:
    base-url: http://localhost:9411

# JWT 配置
jwt:
  secret: ${JWT_SECRET:OpsServiceJWTSecretKey2024ChangeInProduction}
  expiration: 86400000

# Actuator 监控配置
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.example.ops: DEBUG
    com.alibaba.cloud.nacos: DEBUG
