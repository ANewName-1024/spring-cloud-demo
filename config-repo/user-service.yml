# Spring Cloud Config 示例配置

## user-service 配置
spring:
  datasource:
    url: jdbc:postgresql://8.137.116.121:8432/business_db
    username: business
    password: ${DB_PASSWORD:}

jwt:
  secret: ${JWT_SECRET:}
  expiration: 1800000

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USER:admin}:${EUREKA_PASSWORD:}@${EUREKA_HOST:8.137.116.121}:${EUREKA_PORT:9000}/eureka/

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    password: NewPass2024

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    password: ${DB_PASSWORD}
