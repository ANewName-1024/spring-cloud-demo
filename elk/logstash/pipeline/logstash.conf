input {
  beats {
    port => 5044
  }
  
  # TCP 输入 (用于测试)
  tcp {
    port => 5000
    codec => json
  }
}

filter {
  # 解析 JSON 消息
  if [message] {
    json {
      source => "message"
      target => "json"
      remove_field => ["message"]
    }
  }
  
  # 提取 Spring Cloud Sleuth 追踪信息
  if [json][traceId] {
    mutate {
      add_field => {
        "trace_id" => "%{[json][traceId]}"
        "span_id" => "%{[json][spanId]}"
        "service_name" => "%{[json][service_name]}"
        "level" => "%{[json][level]}"
        "logger" => "%{[json][logger_name]}"
      }
    }
  }
  
  # 添加时间戳
  date {
    match => ["timestamp", "yyyy-MM-dd'T'HH:mm:ss.SSSZ", "ISO8601"]
    target => "@timestamp"
  }
  
  # 过滤敏感信息
  mutate {
    gsub => [
      "message", "password[=:]\S+", "password=***",
      "message", "token[=:]\S+", "token=***",
      "message", "secret[=:]\S+", "secret=***"
    ]
  }
  
  # 添加默认字段
  mutate {
    add_field => { "environment" => "production" }
  }
}

output {
  # 输出到 Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "spring-cloud-%{+YYYY.MM.dd}"
    document_type => "_doc"
  }
  
  # 调试输出到控制台
  stdout {
    codec => rubydebug
  }
}
