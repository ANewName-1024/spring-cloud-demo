server:
  port: 8082

spring:
  application:
    name: config-service
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:8432}/${DB_NAME:business_db}?ssl=true&sslmode=verify-full&sslrootcert=${SSL_CERT_PATH}
    username: ${DB_USERNAME:business}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

# 加密配置
encryption:
  algorithm: ${ENCRYPTION_ALGORITHM:SM4}
  default-algorithm: SM4
  root-key-type: ${ROOT_KEY_TYPE:SOFTWARE}  # SOFTWARE / HARDWARE
  root-key-file: ${ROOT_KEY_FILE:}
  working-key-rotation-days: ${WORKING_KEY_ROTATION_DAYS:90}

# Jasypt 加密配置 (兼容旧版)
jasypt:
  encryptor:
    password: ${JASYPT_PASSWORD:ConfigSecretKey2024}
    algorithm: PBEWithMD5AndDES

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USER:admin}:${EUREKA_PASSWORD}@${EUREKA_HOST}:${EUREKA_PORT:9000}/eureka/
  instance:
    prefer-ip-address: true

# OpenClaw 配置
openclaw:
  config:
    default-type: PARAMETER

# JWT 配置
config:
  jwt:
    secret: ${CONFIG_JWT_SECRET:ConfigServiceJWTSecretKey2024ChangeInProduction}
    expiration: ${CONFIG_JWT_EXPIRATION:86400000}
