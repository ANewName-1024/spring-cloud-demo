server:
  port: 8082

spring:
  application:
    name: config-service
  datasource:
    url: jdbc:postgresql://8.137.116.121:8432/business_db?ssl=false
    username: business
    password: NewPass2024
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  cloud:
    config:
      server:
        # 使用 Git 仓库存储配置
        git:
          uri: https://github.com/ANewName-1024/spring-cloud-config
          default-label: master
          search-paths: config
          # 私有仓库需要配置认证
          # username: your-github-username
          # password: your-github-token
        # 使用本地文件系统（备用）
        native:
          search-locations: classpath:/config,file:./config
    discovery:
      enabled: false
  security:
    user:
      name: admin
      password: admin
  actuator:
    endpoints:
      web:
        exposure:
          include: "*"
    endpoint:
      health:
        show-details: always

# 加密配置
encryption:
  algorithm: AES
  default-algorithm: AES
  root-key-type: SOFTWARE
  working-key-rotation-days: 90

# OpenClaw 配置
openclaw:
  config:
    default-type: PARAMETER

# JWT 配置
config:
  jwt:
    secret: ConfigServiceJWTSecret2024
    expiration: 86400000
